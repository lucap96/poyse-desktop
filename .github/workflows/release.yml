name: release

# Builds the macOS (.dmg) and Windows (.zip) apps on GitHub's runners and
# publishes them to a GitHub Release — so the ~290 MB of binaries upload from
# GitHub's network, not a local connection. Run manually (Actions → release →
# Run workflow) or by pushing a v* tag.
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            args: --mac --arm64
          - os: windows-latest
            args: --win --x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - name: Build and publish
        run: npx electron-builder ${{ matrix.args }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # To ship notarized, prompt-free macOS builds, add these repo secrets and
          # UNCOMMENT the lines below (an EMPTY CSC_LINK breaks electron-builder, so
          # only add them once the secrets actually exist):
          #   CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          #   CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          #   APPLE_ID: ${{ secrets.APPLE_ID }}
          #   APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          #   APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
