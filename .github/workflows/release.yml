name: release

# Builds the macOS (.dmg) and Windows (.zip) apps on GitHub's runners and
# publishes them to a GitHub Release — so the ~290 MB of binaries upload from
# GitHub's network, not a local connection.
#
# Runs AUTOMATICALLY on every push to main. A `prepare` job creates the release
# ONCE (unique version 0.1.<run_number>), then the mac + win build jobs upload
# their assets to that existing release. Creating the release up front avoids the
# race where both matrix jobs try to create the same release in parallel and one
# fails with "422 Published releases must have a valid tag". The unique version
# also sidesteps electron-builder's guard against overwriting a release published
# more than 2 hours ago.
on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: v
        run: echo "version=0.1.${{ github.run_number }}" >> "$GITHUB_OUTPUT"
      # Create the tag + release now, so both build jobs find it and only upload.
      # --target pins the tag to this commit; retype to release (not draft) so it
      # becomes "latest" once assets land.
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v0.1.${{ github.run_number }}" \
            --repo "${{ github.repository }}" \
            --target "${{ github.sha }}" \
            --title "v0.1.${{ github.run_number }}" \
            --notes "Automated build from ${{ github.sha }}"

  build:
    needs: prepare
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            args: --mac --arm64
          - os: windows-latest
            args: --win --x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      # Match package.json to the release version electron-builder will target.
      - name: Stamp version
        run: npm version "${{ needs.prepare.outputs.version }}" --no-git-tag-version --allow-same-version
      - run: npm install
      - name: Build and publish
        run: npx electron-builder ${{ matrix.args }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # To ship notarized, prompt-free macOS builds, add these repo secrets and
          # UNCOMMENT the lines below (an EMPTY CSC_LINK breaks electron-builder, so
          # only add them once the secrets actually exist):
          #   CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          #   CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          #   APPLE_ID: ${{ secrets.APPLE_ID }}
          #   APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          #   APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
